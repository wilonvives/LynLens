name: Release

# Trigger by pushing a tag like v0.1.1. The workflow builds the desktop app
# for each platform and attaches the installers to the GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:        # allow manual runs from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14     # Apple Silicon
            platform: mac-arm64
          - os: windows-latest
            platform: win-x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download ffmpeg binary
        run: pnpm bootstrap:ffmpeg

      # ---- whisper.cpp: Mac has no prebuilt, compile from source. ----
      - name: Build whisper.cpp (mac only)
        if: startsWith(matrix.os, 'macos')
        run: |
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git /tmp/whisper.cpp
          cd /tmp/whisper.cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j
          ARCH_DIR="${{ matrix.platform }}"
          mkdir -p "$GITHUB_WORKSPACE/packages/desktop/resources/whisper/$ARCH_DIR"
          cp build/bin/whisper-cli "$GITHUB_WORKSPACE/packages/desktop/resources/whisper/$ARCH_DIR/"
          chmod +x "$GITHUB_WORKSPACE/packages/desktop/resources/whisper/$ARCH_DIR/whisper-cli"

      # On Windows the bootstrap script downloads the official prebuilt zip.
      - name: Download whisper binary + model
        run: pnpm bootstrap:whisper

      - name: Build TypeScript
        run: pnpm build

      - name: Package app
        env:
          # electron-builder uses GH_TOKEN to upload artifacts to the Release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ---- Code signing (optional) ----
          # Mac: set these secrets to auto-sign + notarize.
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows: set these secrets to auto-sign.
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: pnpm package:desktop

      # Fallback upload in case the auto-publish to Release fails (e.g. running
      # on workflow_dispatch without a tag). Keeps the installers accessible.
      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lynlens-${{ matrix.platform }}
          path: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.exe
            packages/desktop/release/*.zip
          if-no-files-found: ignore
