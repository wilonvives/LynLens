appId: com.lynlens.app
productName: LynLens
copyright: "Copyright © 2026"

directories:
  output: release
  buildResources: build

# 1024x1024 PNG. electron-builder auto-generates Mac .icns + Windows .ico
# from this single source — no need to ship platform-specific icon files.
icon: build/icon.png

asar: false

files:
  - dist/**
  - package.json
  - "!node_modules/**/test/**"
  - "!node_modules/**/tests/**"

# Auto-publish to GitHub Releases when env GH_TOKEN is set and the version is tagged.
# Tag like v0.1.1 → release page gets the .dmg / .exe automatically.
publish:
  provider: github
  owner: wilonvives
  repo: LynLens

win:
  target:
    - target: nsis
      arch: [x64]
  # Signing happens automatically when these env vars are present:
  #   WIN_CSC_LINK, WIN_CSC_KEY_PASSWORD   — code-signing .pfx (base64)
  # Missing → unsigned (SmartScreen warning on first run, but still runs).
  extraResources:
    - from: resources/ffmpeg/win
      to: ffmpeg
      filter: ["**/*"]
    - from: resources/whisper/win
      to: whisper
      filter: ["**/*"]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  # arm64-only for now. Apple Silicon shipped 2020; cross-compiling x64
  # support would require x64 whisper / sherpa binaries we don't yet
  # produce. Re-enable x64 (and add the matching bootstrap step in
  # release.yml) when there's actual demand from Intel Mac users.
  target:
    - target: dmg
      arch: [arm64]
  category: public.app-category.video
  # ---------------------------------------------------------------
  # Signing config is intentionally OFF until we own an Apple Developer
  # cert. With `hardenedRuntime: true` + `entitlements` + `notarize`
  # all set but CSC_LINK / APPLE_ID env vars missing, electron-builder
  # tries to invoke codesign / notarytool with empty creds and dies
  # with the cryptic "/packages/desktop not a file" error.
  #
  # When signing creds are added (CSC_LINK + CSC_KEY_PASSWORD + APPLE_ID
  # + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID), uncomment this whole
  # block to enable hardened runtime + entitlements + notarization:
  #
  #   hardenedRuntime: true
  #   gatekeeperAssess: false
  #   entitlements: build/entitlements.mac.plist
  #   entitlementsInherit: build/entitlements.mac.plist
  #   notarize: true
  # ---------------------------------------------------------------
  identity: null    # forces electron-builder to skip signing entirely
  extraResources:
    - from: resources/ffmpeg/mac-${arch}
      to: ffmpeg
      filter: ["**/*"]
    - from: resources/whisper/mac-${arch}
      to: whisper
      filter: ["**/*"]
