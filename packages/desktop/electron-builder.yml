appId: com.lynlens.app
productName: LynLens
copyright: "Copyright © 2026"

directories:
  output: release
  buildResources: build

asar: false

files:
  - dist/**
  - package.json
  - "!node_modules/**/test/**"
  - "!node_modules/**/tests/**"

# Auto-publish to GitHub Releases when env GH_TOKEN is set and the version is tagged.
# Tag like v0.1.1 → release page gets the .dmg / .exe automatically.
publish:
  provider: github
  owner: wilonvives
  repo: LynLens

win:
  target:
    - target: nsis
      arch: [x64]
  # Signing happens automatically when these env vars are present:
  #   WIN_CSC_LINK, WIN_CSC_KEY_PASSWORD   — code-signing .pfx (base64)
  # Missing → unsigned (SmartScreen warning on first run, but still runs).
  extraResources:
    - from: resources/ffmpeg/win
      to: ffmpeg
      filter: ["**/*"]
    - from: resources/whisper/win
      to: whisper
      filter: ["**/*"]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  # arm64-only for now. Apple Silicon shipped 2020; cross-compiling x64
  # support would require x64 whisper / sherpa binaries we don't yet
  # produce. Re-enable x64 (and add the matching bootstrap step in
  # release.yml) when there's actual demand from Intel Mac users.
  target:
    - target: dmg
      arch: [arm64]
  category: public.app-category.video
  hardenedRuntime: true
  gatekeeperAssess: false
  # Signing happens automatically when these env vars are present in the
  # build environment:
  #   CSC_LINK, CSC_KEY_PASSWORD            — Developer ID .p12 (base64)
  #   APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID  — for notarization
  # If the env vars are missing, builds are unsigned (dev/local case).
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # notarize is intentionally NOT set: electron-builder defaults to false
  # when Apple credentials are missing. Setting `notarize: true` without
  # creds makes it error early with cryptic "not a file" failures
  # because it tries to invoke notarytool with empty args. Once we
  # add Apple Developer creds to GH Secrets, change to `notarize: true`.
  extraResources:
    - from: resources/ffmpeg/mac-${arch}
      to: ffmpeg
      filter: ["**/*"]
    - from: resources/whisper/mac-${arch}
      to: whisper
      filter: ["**/*"]
